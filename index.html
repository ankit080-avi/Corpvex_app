<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Corpvex Authenticator</title>
<meta name="description" content="Receive one-time login codes for the Corpvex ERP on your phone."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css?v=2"/>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#4f46e5"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Corpvex"/>
</head>
<body>

<div id="app" class="app-shell">
  <main id="view" class="view"></main>
</div>

<!-- Toast layer -->
<div id="toastHost" class="toast-host" aria-live="polite"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="firebase-config.js?v=2"></script>
<script src="app.js?v=2" defer></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
